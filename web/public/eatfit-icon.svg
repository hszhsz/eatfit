<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF8A3D"/>
    </linearGradient>
    <linearGradient id="forkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF5EE"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Fork (left) -->
  <g transform="translate(160, 96)">
    <!-- Fork handle -->
    <rect x="14" y="100" width="12" height="220" rx="6" fill="url(#forkGrad)"/>
    <!-- Fork tines -->
    <rect x="0" y="0" width="6" height="110" rx="3" fill="url(#forkGrad)"/>
    <rect x="12" y="0" width="6" height="110" rx="3" fill="url(#forkGrad)"/>
    <rect x="24" y="0" width="6" height="110" rx="3" fill="url(#forkGrad)"/>
    <!-- Fork base connector -->
    <rect x="0" y="100" width="30" height="14" rx="7" fill="url(#forkGrad)"/>
  </g>
  <!-- Knife (right) -->
  <g transform="translate(300, 96)">
    <!-- Knife handle -->
    <rect x="8" y="140" width="14" height="180" rx="7" fill="url(#forkGrad)"/>
    <!-- Knife blade -->
    <path d="M 8 0 Q 15 0 22 20 L 22 140 L 8 140 Z" fill="url(#forkGrad)"/>
  </g>
  <!-- Small leaf accent (top right) -->
  <g transform="translate(340, 60)">
    <path d="M 0 30 Q 0 0 30 0 Q 30 30 0 30 Z" fill="#22C55E" opacity="0.9"/>
    <path d="M 5 25 Q 15 15 25 5" stroke="#16A34A" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
</svg>
